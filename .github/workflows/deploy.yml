# Deploy automático: build da imagem Docker e push para o Docker Hub ao integrar em main.
#
# Secrets necessários no repositório (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — utilizador Docker Hub
#   DOCKERHUB_TOKEN      — Access Token (recomendado) ou password
#
# Opcional: variável DOCKER_IMAGE (Settings → Variables) no formato "utilizador/nome-imagem"
# para sobrescrever o nome predefinido (utilizador/nome-do-repositório em minúsculas).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir nome da imagem
        id: image
        run: |
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          if [ -n "${{ vars.DOCKER_IMAGE }}" ]; then
            echo "name=${{ vars.DOCKER_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/${REPO_LC}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados e tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
